name: FastAPI CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python -c "import fastapi"

      - run: docker build -t fastapi-app:pr-${{ github.event.pull_request.number }} .

  test-build-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set tag
        id: version
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/fastapi-app:${{ steps.version.outputs.tag }}

      - name: Checkout deploy repo
        uses: actions/checkout@v4
        with:
          repository: karthi-a04/fast-api-ci-cd-app-deployment
          token: ${{ secrets.GH_PAT }}
          path: deploy-repo

      - name: Update image
        run: |
          sed -i "s|\(image: .*/fastapi-app:\).*|\1${{ steps.version.outputs.tag }}|" deploy-repo/deployment.yaml

      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cd deploy-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          BRANCH="update-image-${{ steps.version.outputs.tag }}"
          git checkout -b $BRANCH
          git add deployment.yaml
          git commit -m "chore: update image tag to ${{ steps.version.outputs.tag }}"
          git push origin $BRANCH

          gh pr create \
            --repo karthi-a04/fast-api-ci-cd-app-deployment \
            --base main \
            --head $BRANCH \
            --title "Update image to ${{ steps.version.outputs.tag }}" \
            --body "Automated PR: update container image to \`${{ secrets.DOCKER_USERNAME }}/fastapi-app:${{ steps.version.outputs.tag }}\`"
